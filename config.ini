# ─────────────────────────────────────────────────────────────────────────────
# Media Converter — Configuration File
# ─────────────────────────────────────────────────────────────────────────────
# Paths can be local or network (UNC paths like \\server\share\folder).
# Use absolute paths. Relative paths are relative to converter.py location.
#
# Examples:
#   local:    C:\Users\Maria\Videos\inbox
#   network:  \\NAS\media\inbox
#             \\192.168.1.10\share\inbox
# ─────────────────────────────────────────────────────────────────────────────

# V:\0000 Tekuchi Media Processor
[paths]
base_path =  V:\0000 Tekuchi Media Processor

#MEDIA CONVERTER
inbox      = %(base_path)s\TODO
processing = %(base_path)s\processing
converted  = %(base_path)s\PROCESSED
archive    = %(base_path)s\PROCESSED_SOURCES
temp       = %(base_path)s\.tmp

# IMAGE CROPPER
cropper_inbox     = %(base_path)s\VIEWS_TODO
cropper_processed = %(base_path)s\VIEWS_PROCESSED

[images]
# Target height in pixels. Width is calculated automatically to preserve aspect ratio.
# Example: a 3840x2160 image becomes 1920x1080. A 1280x960 image becomes 1440x1080.
target_height = 1080

[video]
# Output resolution for videos (width x height).
max_width  = 1920
max_height = 1080

[general]
# How long a file must sit in inbox before being picked up (seconds).
# Prevents processing files that are still being copied.
min_file_age_s = 0

# Poll interval in watch mode (seconds). Default: 900 = 15 minutes.
interval = 900
